<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>BanglaMap — Division Quest</title>

<body>

  <!-- Ambient background particles -->
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>

  <!-- HEADER / HUD -->
  <header class="hud">
    <div class="hud-brand">
      <span class="brand-flag">🇧🇩</span>
      <span class="brand-name">BanglaMap</span>
    </div>

    <div class="hud-stats">
      <div class="stat-pill" id="stat-score">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score-display">0</span>
      </div>
      <div class="stat-pill streak-pill" id="stat-streak">
        <span class="stat-label">Streak</span>
        <span class="stat-value" id="streak-display">0</span>
        <span class="streak-fire" id="streak-fire"></span>
      </div>
      <div class="stat-pill" id="stat-best">
        <span class="stat-label">Best</span>
        <span class="stat-value" id="best-display">0</span>
      </div>
    </div>

    <div class="hud-timer">
      <svg class="timer-ring" viewBox="0 0 44 44">
        <circle class="timer-track" cx="22" cy="22" r="18"/>
        <circle class="timer-progress" id="timer-ring-prog" cx="22" cy="22" r="18"/>
      </svg>
      <span class="timer-number" id="timer-number">15</span>
    </div>
  </header>

  <!-- MISSION CARD -->
  <section class="mission-section">
    <div class="mission-card" id="mission-card">
      <div class="mission-top">
        <span class="mission-label">FIND THE DIVISION</span>
        <div class="question-badge" id="question-badge">1 / 8</div>
      </div>
      <div class="mission-city" id="mission-city">—</div>
    </div>

    <div class="next-preview" id="next-preview">
      <span class="next-label">UP NEXT →</span>
      <span class="next-city" id="next-city-name">—</span>
    </div>
  </section>

  <!-- MAP AREA -->
  <main class="map-wrapper">
    <div class="map-glow"></div>
    <div class="map-container" id="map-container">
